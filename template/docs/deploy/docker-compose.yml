services:
  app:
    image: ${APP_IMAGE:-example/app:latest}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${APP_ENV:-Production}
      CONNECTION_STRING: ${CONNECTION_STRING:-<replace-with-secret>}
    # Replace with project-specific health check command.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
