<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Connection lines from center to corners -->
  <line x1="256" y1="278" x2="136" y2="180" stroke="white" stroke-width="1.5" opacity="0.15"/>
  <line x1="256" y1="278" x2="376" y2="180" stroke="white" stroke-width="1.5" opacity="0.15"/>
  <line x1="256" y1="278" x2="136" y2="376" stroke="white" stroke-width="1.5" opacity="0.15"/>
  <line x1="256" y1="278" x2="376" y2="376" stroke="white" stroke-width="1.5" opacity="0.15"/>

  <!-- Top horizontal stroke (一) -->
  <line x1="136" y1="152" x2="376" y2="152"
        stroke="white" stroke-width="10" stroke-linecap="round"/>
  <circle cx="136" cy="152" r="7" fill="white"/>
  <circle cx="376" cy="152" r="7" fill="white"/>

  <!-- Main body frame -->
  <rect x="136" y="180" width="240" height="196" rx="22"
        fill="none" stroke="white" stroke-width="8"/>
  <circle cx="136" cy="180" r="7" fill="white"/>
  <circle cx="376" cy="180" r="7" fill="white"/>
  <circle cx="136" cy="376" r="7" fill="white"/>
  <circle cx="376" cy="376" r="7" fill="white"/>

  <!-- Internal horizontal stroke -->
  <line x1="172" y1="278" x2="340" y2="278"
        stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <circle cx="172" cy="278" r="5" fill="white" opacity="0.55"/>
  <circle cx="340" cy="278" r="5" fill="white" opacity="0.55"/>

  <!-- Center glowing node -->
  <circle cx="256" cy="278" r="24" fill="#c4b5fd" filter="url(#glow)" opacity="0.5"/>
  <circle cx="256" cy="278" r="14" fill="white"/>
</svg>
