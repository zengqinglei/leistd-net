<div class="min-h-screen flex flex-col items-center justify-center bg-surface-ground px-6">
  <div class="max-w-2xl text-center space-y-8">
    <h1 class="text-5xl font-bold text-color">模板项目</h1>
    <p class="text-xl text-muted-color"> 基于 Angular + PrimeNG + .NET 10 DDD 架构的全栈应用开发模板 </p>

    <div class="flex items-center justify-center gap-4">
      <p-button label="登录" routerLink="/auth/login" />
      <p-button label="注册" routerLink="/auth/register" [outlined]="true" />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 pt-8">
      <div class="p-6 rounded-xl bg-surface-card border border-surface">
        <i class="pi pi-shield text-3xl text-primary mb-3"></i>
        <h3 class="font-semibold text-color">身份认证</h3>
        <p class="text-sm text-muted-color mt-2">基于 Cookie 的认证与角色权限管理</p>
      </div>
      <div class="p-6 rounded-xl bg-surface-card border border-surface">
        <i class="pi pi-users text-3xl text-primary mb-3"></i>
        <h3 class="font-semibold text-color">用户管理</h3>
        <p class="text-sm text-muted-color mt-2">完整的 CRUD 操作与权限控制</p>
      </div>
      <div class="p-6 rounded-xl bg-surface-card border border-surface">
        <i class="pi pi-palette text-3xl text-primary mb-3"></i>
        <h3 class="font-semibold text-color">主题系统</h3>
        <p class="text-sm text-muted-color mt-2">深色模式 + Tailwind CSS + PrimeNG</p>
      </div>
    </div>
  </div>
</div>
