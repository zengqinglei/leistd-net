<div class="flex flex-col h-full overflow-hidden">
  <div class="flex-1 overflow-y-auto p-6 custom-scrollbar">
    <div class="mb-6 flex flex-col items-stretch justify-between gap-4 md:flex-row md:items-center">
      <div class="flex flex-1 flex-col items-stretch gap-3 sm:flex-row sm:items-center">
        <p-select
          [options]="applicationTypeOptions"
          [ngModel]="selectedApplicationType()"
          (ngModelChange)="onApplicationTypeChange($event)"
          optionLabel="label"
          optionValue="value"
          placeholder="全部应用类型"
          [showClear]="true"
          appendTo="body"
          styleClass="w-full sm:w-48" />

        <p-select
          [options]="clientTypeOptions"
          [ngModel]="selectedClientType()"
          (ngModelChange)="onClientTypeChange($event)"
          optionLabel="label"
          optionValue="value"
          placeholder="全部客户端类型"
          [showClear]="true"
          appendTo="body"
          styleClass="w-full sm:w-48" />

        <p-iconfield class="w-full sm:max-w-xs sm:flex-1">
          <p-inputicon class="pi pi-search" />
          <input
            pInputText
            type="text"
            placeholder="搜索应用名称 / Client ID..."
            [ngModel]="searchQuery()"
            (ngModelChange)="onSearchQueryChange($event)"
            class="w-full" />
        </p-iconfield>
      </div>

      <div class="flex items-center justify-end gap-3 shrink-0">
        <p-button
          icon="pi pi-refresh"
          label="刷新"
          (onClick)="onFilter()"
          styleClass="w-full sm:w-auto"
          pTooltip="刷新"
          tooltipPosition="top" />
        <p-button
          label="新建开放应用"
          icon="pi pi-plus"
          (onClick)="openAddDialog()"
          [outlined]="true"
          severity="primary"
          styleClass="w-full sm:w-auto" />
      </div>
    </div>

    <app-open-application-table
      [applications]="applications()"
      [totalRecords]="totalRecords()"
      [loading]="loading()"
      (filterChange)="onPageChange($event)"
      (edit)="openEditDialog($event)"
      (delete)="handleDelete($event)"
      (resetSecret)="handleResetSecret($event)" />
  </div>
</div>

<app-open-application-edit-dialog
  [(visible)]="editDialogVisible"
  [loading]="editDialogLoading()"
  [saving]="editDialogSaving()"
  [application]="selectedApplication()"
  (saved)="handleSave($event)" />

<p-dialog
  [visible]="resetSecretDialogVisible()"
  (visibleChange)="resetSecretDialogVisible.set($event)"
  header="Client Secret 已重置"
  [modal]="true"
  [style]="{ width: '420px' }"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-3">
    <div
      class="rounded-lg border border-orange-200 bg-orange-50 px-3 py-2 text-sm text-orange-700 dark:border-orange-500/30 dark:bg-orange-500/10 dark:text-orange-300"
    >
      请立即复制并安全保存，该密钥后续不会再次明文展示。
    </div>
    <div class="flex items-center gap-2 rounded border border-surface-200 bg-surface-50 p-2 dark:border-surface-700 dark:bg-surface-800">
      <span class="min-w-0 flex-1 truncate font-mono text-xs">{{ resetSecretValue() }}</span>
      <p-button icon="pi pi-copy" [text]="true" [rounded]="true" (onClick)="copyResetSecret()" pTooltip="复制" tooltipPosition="top"/>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="关闭" (onClick)="resetSecretDialogVisible.set(false)"/>
  </ng-template>
</p-dialog>

<p-dialog
  [visible]="createdSecretDialogVisible()"
  (visibleChange)="createdSecretDialogVisible.set($event)"
  header="客户端密钥"
  [modal]="true"
  [style]="{ width: '450px' }"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-3">
    <div
      class="rounded-lg border border-orange-200 bg-orange-50 px-3 py-2 text-sm text-orange-700 dark:border-orange-500/30 dark:bg-orange-500/10 dark:text-orange-300"
    >
      请立即复制并安全保存，该密钥后续不会再次明文展示。
    </div>
    <div class="flex items-center gap-2 rounded border border-surface-200 bg-surface-50 p-2 dark:border-surface-700 dark:bg-surface-800">
      <span class="min-w-0 flex-1 truncate font-mono text-xs">{{ createdSecretValue() }}</span>
      <p-button icon="pi pi-copy" [text]="true" [rounded]="true" (onClick)="copyCreatedSecret()" pTooltip="复制" tooltipPosition="top"/>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="复制并关闭" icon="pi pi-copy" (onClick)="copyCreatedSecret(); createdSecretDialogVisible.set(false)"/>
  </ng-template>
</p-dialog>

<p-confirmDialog
  header="确认"
  icon="pi pi-exclamation-triangle"
  acceptLabel="确定"
  rejectLabel="取消"
  acceptButtonStyleClass="p-button-danger p-button-text"
  rejectButtonStyleClass="p-button-text p-button-secondary"
>
</p-confirmDialog>
