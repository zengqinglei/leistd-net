<div class="p-4 md:p-6">
  <p-card>
    <ng-template pTemplate="header">
      <div class="px-6 pt-6">
        <h2 class="text-2xl font-bold m-0 text-color">欢迎使用管理后台</h2>
        <p class="text-muted-color mt-2 mb-0">
          @if (authService.currentUser(); as user) {
            当前登录用户：{{ user.nickname || user.username }}
          }
        </p>
      </div>
    </ng-template>
    <div class="px-6 pb-6">
      <p class="text-muted-color"> 这是一个基础模板项目。你可以在「用户管理」中管理用户，在左侧菜单中扩展更多功能模块。 </p>
    </div>
  </p-card>
</div>
