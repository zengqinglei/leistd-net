<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onHide)="onHide()"
  header="重置用户密码"
  [modal]="true"
  [breakpoints]="dialogConfig.breakpoints"
  [style]="{ width: '420px' }"
  [draggable]="dialogConfig.draggable"
  [resizable]="dialogConfig.resizable"
>
  <div class="flex flex-col gap-4" [formGroup]="form">
    <div
      class="rounded-lg border border-orange-200 bg-orange-50 px-3 py-2 text-sm text-orange-700 dark:border-orange-500/30 dark:bg-orange-500/10 dark:text-orange-300"
    >
      重置后用户需要使用新密码登录。
    </div>

    <div
      class="rounded-lg border border-surface-200 bg-surface-50 px-4 py-3 text-xs text-muted-color dark:border-surface-700 dark:bg-surface-900"
    >
      新密码规则：8~20 位，且必须同时包含大写字母、小写字母、数字和特殊字符。
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-color">新密码</label>
      <p-password formControlName="password" [feedback]="false" [toggleMask]="true" [fluid]="true" inputStyleClass="w-full" />
      @if (form.controls.password.hasError('required') && form.controls.password.touched) {
        <small class="text-red-500">请输入新密码</small>
      }
      @if (hasPasswordRuleError()) {
        <small class="text-red-500">新密码不符合规则，需同时包含大小写字母、数字和特殊字符</small>
      }
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="取消" severity="secondary" [text]="true" (onClick)="visible.set(false)" />
      <p-button label="确认重置" [loading]="saving()" (onClick)="save()" />
    </div>
  </ng-template>
</p-dialog>
