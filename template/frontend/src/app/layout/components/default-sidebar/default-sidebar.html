<aside
  class="bg-surface-50 dark:bg-surface-900 border-r border-surface-200 dark:border-surface-800 flex flex-col h-full transition-all duration-300 ease-in-out"
  [ngClass]="{
    'w-64': !layoutService.sidebarCollapsed() || isMobileMenuOpen(),
    'w-20': layoutService.sidebarCollapsed() && !isMobileMenuOpen()
  }"
>
  <div
    [class.gap-3]="!layoutService.sidebarCollapsed() || isMobileMenuOpen()"
    [class.gap-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
    class="h-16 px-6 flex items-center justify-between border-b border-surface-200 dark:border-surface-800 shrink-0 overflow-hidden transition-all duration-300 ease-in-out"
  >
    <div class="flex items-center gap-3">
      <app-logo size="normal" />

      <span
        class="font-semibold text-base tracking-tight text-color whitespace-nowrap overflow-hidden transition-all duration-300 ease-in-out"
        [class.max-w-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
        [class.opacity-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
        [class.max-w-40]="!layoutService.sidebarCollapsed() || isMobileMenuOpen()"
        [class.opacity-100]="!layoutService.sidebarCollapsed() || isMobileMenuOpen()"
        >模板项目</span
      >
    </div>

    <p-button
      icon="pi pi-times"
      [text]="true"
      [rounded]="true"
      severity="secondary"
      class="md:hidden min-w-[44px] min-h-[44px]"
      styleClass="w-10 h-10"
      (onClick)="mobileMenuClosed.emit()"
    >
    </p-button>
  </div>

  <nav class="flex-1 px-3 py-4 overflow-y-auto overflow-x-hidden">
    <ul class="list-none p-0 m-0">
      @for (group of menuGroups(); track $index) {
        @if (group.label) {
          <li
            class="px-3 pt-5 pb-1 text-xs font-medium text-muted-color/70 uppercase tracking-wider whitespace-nowrap overflow-hidden transition-all duration-300 ease-in-out"
            [class.max-h-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
            [class.opacity-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
          >
            {{ group.label }}
          </li>
        }
        @for (item of group.items; track item.route) {
          <li>
            <a
              [routerLink]="item.route"
              [pTooltip]="layoutService.sidebarCollapsed() && !isMobileMenuOpen() ? item.label : undefined"
              tooltipPosition="right"
              class="flex items-center cursor-pointer px-3 py-4 md:py-3 rounded-md text-muted-color hover:bg-surface-100 dark:hover:bg-surface-800 transition-all duration-300 ease-in-out focus:outline-none min-h-[44px] md:min-h-0"
              [class.gap-3]="!layoutService.sidebarCollapsed() || isMobileMenuOpen()"
              [class.gap-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
              [class.!text-primary-600]="isItemActive(item)"
              [class.dark:!text-primary-400]="isItemActive(item)"
              [class.bg-primary-50]="isItemActive(item)"
              [class.dark:bg-primary-500/10]="isItemActive(item)"
              [class.font-semibold]="isItemActive(item)"
              (click)="isMobileMenuOpen() && mobileMenuClosed.emit()"
            >
              <div class="w-8 h-8 flex items-center justify-center shrink-0">
                <i class="pi {{ item.icon }} text-base"></i>
              </div>
              <span
                class="font-medium whitespace-nowrap overflow-hidden transition-all duration-300 ease-in-out"
                [class.max-w-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
                [class.opacity-0]="layoutService.sidebarCollapsed() && !isMobileMenuOpen()"
                [class.max-w-60]="!layoutService.sidebarCollapsed() || isMobileMenuOpen()"
                [class.opacity-100]="!layoutService.sidebarCollapsed() || isMobileMenuOpen()"
                >{{ item.label }}</span
              >
            </a>
          </li>
        }
      }
    </ul>
  </nav>
</aside>
