<!-- 应用主布局容器 -->
<!-- 使用 bg-surface-ground 作为全局背景色，自动适配 Light/Dark -->
<div data-layout="default" class="flex h-screen overflow-hidden bg-surface-ground">
  <!-- 桌面端侧边栏 -->
  <app-default-sidebar [isMobileMenuOpen]="false" class="hidden md:block h-full shrink-0"> </app-default-sidebar>

  <!-- 移动端抽屉 -->
  <p-drawer
    class="md:hidden"
    position="left"
    [visible]="isMobileMenuOpen()"
    [modal]="true"
    [dismissible]="true"
    [showCloseIcon]="false"
    [closable]="false"
    [blockScroll]="true"
    styleClass="!w-64 max-w-full overflow-hidden"
    (visibleChange)="isMobileMenuOpen.set($event)"
  >
    <ng-template #headless>
      <app-default-sidebar [isMobileMenuOpen]="true" (mobileMenuClosed)="closeMobileMenu()" class="h-full w-full"> </app-default-sidebar>
    </ng-template>
  </p-drawer>

  <!-- 右侧：Header + 内容区域 + Footer -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <app-default-header (toggleMobileMenu)="toggleMobileMenu()"></app-default-header>

    <!-- 主内容区域 -->
    <!-- 使用 bg-surface-50 dark:bg-surface-950 作为背景色，自动适配 Light/Dark -->
    <main class="flex-1 overflow-auto bg-surface-50 dark:bg-surface-950 custom-scrollbar scroll-smooth">
      <router-outlet></router-outlet>
    </main>

    <!-- Footer -->
    <app-default-footer></app-default-footer>
  </div>
</div>
