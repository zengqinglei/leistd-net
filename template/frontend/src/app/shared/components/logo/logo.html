<div
  [ngClass]="{
    'h-8 w-8 rounded-lg': size() === 'normal',
    'h-14 w-14 rounded-xl': size() === 'large'
  }"
  class="flex items-center justify-center bg-gradient-to-tr from-primary-900/40 to-primary-800/40 backdrop-blur-md border border-primary-400/30 shadow-[0_0_15px_rgba(var(--p-primary-500),0.2)] group-hover:scale-105 transition-transform duration-300"
>
  <svg
    [ngClass]="{
      'w-6 h-6': size() === 'normal',
      'w-10 h-10': size() === 'large'
    }"
    class="drop-shadow-[0_0_8px_rgba(var(--p-primary-400),0.8)]"
    viewBox="0 0 100 100"
    xmlns="http://www.w3.org/2000/svg"
  >
    <text x="50" y="72" font-size="60" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">T</text>
  </svg>
</div>
