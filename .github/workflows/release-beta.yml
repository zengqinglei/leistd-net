name: Release Beta

# Beta 预发布：push 到 develop 时触发，产出 x.y.z-beta.N 发到 nuget.org（公开预发布）。
# 不回写 VERSION、不打 tag（预发布是易逝的）。
on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  beta:
    if: "github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # NuGet Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 推算 beta 版本
        id: ver
        shell: pwsh
        run: pwsh scripts/compute-version.ps1 -PreRelease beta

      - name: 打包（显式版本）
        shell: pwsh
        run: |
          pwsh scripts/sync-version.ps1 -Version "${{ steps.ver.outputs.version }}"
          dotnet pack framework/Leistd.Framework.slnx -c Release `
            -o framework/artifacts `
            -p:Version="${{ steps.ver.outputs.version }}" `
            -p:ContinuousIntegrationBuild=true

      - name: 登录 nuget.org（Trusted Publishing）
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: 推送 beta 到 nuget.org
        run: >
          dotnet nuget push "framework/artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
