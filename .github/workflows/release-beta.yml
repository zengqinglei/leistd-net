name: Release Beta

# Beta 预发布：推送到 develop 时触发。
# GitVersion 在 develop 上产出 x.y.z-beta.N，发布到 nuget.org（预发布，公开可见）。
on:
  push:
    branches: [develop]

jobs:
  release:
    name: 打包并发布 beta 到 nuget.org
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # NuGet Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 安装 GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.7.x'

      - name: 计算版本（GitVersion）
        id: gv
        uses: gittools/actions/gitversion/execute@v4
        with:
          useConfigFile: true

      - name: 同步版本到模板
        shell: pwsh
        run: pwsh scripts/sync-version.ps1 -Version "${{ steps.gv.outputs.semVer }}"

      - name: 打包
        run: pwsh framework/build/pack.ps1

      - name: 登录 nuget.org（Trusted Publishing）
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: 推送 beta 到 nuget.org
        run: >
          dotnet nuget push "framework/artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
