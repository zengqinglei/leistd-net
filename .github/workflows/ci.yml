name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: 构建框架
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GitVersion 需要完整 git 历史来推算版本

      - name: 安装 .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # GitVersion.MsBuild 在 CI（GITHUB_ACTIONS=true）下自动注入版本号，
      # 此处只验证框架可编译；版本一致性由发布流水线在打包时回写模板保证。
      - name: 还原与构建框架
        run: dotnet build framework/Leistd.Framework.slnx -c Release
