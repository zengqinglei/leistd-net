name: Release

# 单一发布流水线：
#   push main    -> stable  : vX.Y.Z，发布 nuget.org + GitHub 正式 Release
#   push develop -> beta    : vX.Y.Z-beta.N，发布 nuget.org 预发布包 + GitHub prerelease
#   schedule     -> nightly : vX.Y.Z-preview.YYYYMMDD.RUN，发布 GitHub Packages + tag
# 发布原则：所有通道都打唯一 tag；stable Release Notes 从上一个 stable tag 累积所有 beta/nightly 期间变更。
on:
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 18 * * 1-5'   # UTC 18:00（北京次日 02:00），工作日 -> nightly
  workflow_dispatch:

jobs:
  release:
    # 跳过机器人自身回写提交与 [skip ci]，避免死循环；schedule/dispatch 没有 head_commit。
    if: github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 回写 VERSION / 打 tag / 建 Release
      id-token: write      # nuget.org Trusted Publishing（stable/beta）
      packages: write      # GitHub Packages（nightly）
    steps:
      - uses: actions/checkout@v4
        with:
          # nightly 固定构建 develop；其余构建触发分支。
          ref: ${{ (github.event_name == 'schedule') && 'develop' || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 判定发布通道
        id: ch
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'schedule') {
            $channel = 'nightly'
          } elseif ('${{ github.ref }}' -eq 'refs/heads/main') {
            $channel = 'stable'
          } elseif ('${{ github.ref }}' -eq 'refs/heads/develop') {
            $channel = 'beta'
          } else {
            $channel = 'beta'
          }

          "channel=$channel" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "发布通道: $channel"

      - name: 判断是否需要发版（stable）
        id: gate
        if: steps.ch.outputs.channel == 'stable' && github.event_name == 'push'
        shell: pwsh
        run: |
          $changed = git diff --name-only HEAD~1..HEAD
          # 仅框架源码或 VERSION 变更才发正式版；排除 framework/docs 与 *.md，模板/文档改动不误发。
          $hit = $changed | Where-Object {
            ($_ -eq 'VERSION') -or
            ($_ -match '^framework/' -and $_ -notmatch '^framework/docs/' -and $_ -notmatch '\.md$')
          }

          "needed=$([bool]$hit ? 'true' : 'false')" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host ($hit ? '需要发版' : '仅非框架变更，跳过 stable')

      - name: 是否继续
        id: go
        shell: pwsh
        run: |
          $go = '${{ steps.ch.outputs.channel }}' -ne 'stable' -or '${{ github.event_name }}' -ne 'push' -or '${{ steps.gate.outputs.needed }}' -eq 'true'
          "go=$($go ? 'true' : 'false')" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "go=$go"

      - name: 安装 .NET 10 SDK
        if: steps.go.outputs.go == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 推算版本与 tag
        id: ver
        if: steps.go.outputs.go == 'true'
        shell: pwsh
        run: |
          git fetch --tags --force

          $base = (Get-Content VERSION -Raw).Trim()
          if ($base -notmatch '^\d+\.\d+\.\d+$') { throw "VERSION 非法: $base" }

          $stableTags = @(git tag --merged HEAD | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Sort-Object { [version]($_ -replace '^v', '') })
          $lastStableTag = if ($stableTags.Count -gt 0) { $stableTags[-1] } else { '' }
          $range = if ([string]::IsNullOrWhiteSpace($lastStableTag)) { 'HEAD' } else { "$lastStableTag..HEAD" }
          $commitCount = [int](git rev-list --count $range)
          $log = git log $range --pretty=format:'%s%n%b' --no-merges
          $logText = ($log -join "`n")

          $p = $base.Split('.')
          [int]$maj = $p[0]
          [int]$min = $p[1]
          [int]$pat = $p[2]

          $bump = 'patch'
          if ($logText -match '(?im)(BREAKING CHANGE)|(^[a-z]+(\([^)]*\))?!:)') { $bump = 'major' }
          elseif ($logText -match '(?im)^feat(\([^)]*\))?:') { $bump = 'minor' }

          switch ($bump) {
            'major' { $maj++; $min = 0; $pat = 0 }
            'minor' { $min++; $pat = 0 }
            default { $pat++ }
          }

          $baseVersion = "$maj.$min.$pat"
          $preNumber = [Math]::Max($commitCount, 1)
          switch ('${{ steps.ch.outputs.channel }}') {
            'beta' {
              $version = "$baseVersion-beta.$preNumber"
            }
            'nightly' {
              # NuGet SemVer2 兼容：日期与 run_number 都是不带前导 0 的数字标识符。
              $version = "$baseVersion-preview.$(Get-Date -Format 'yyyyMMdd').${{ github.run_number }}"
            }
            default {
              $version = $baseVersion
            }
          }

          $tag = "v$version"
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append
          "baseVersion=$baseVersion" | Out-File $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          "lastStableTag=$lastStableTag" | Out-File $env:GITHUB_OUTPUT -Append
          "bump=$bump" | Out-File $env:GITHUB_OUTPUT -Append
          "commitCount=$commitCount" | Out-File $env:GITHUB_OUTPUT -Append

          Write-Host "通道=${{ steps.ch.outputs.channel }} bump=$bump version=$version tag=$tag lastStable=$lastStableTag"

      - name: 检查 tag 是否已存在
        if: steps.go.outputs.go == 'true'
        shell: pwsh
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          if (git rev-parse -q --verify "refs/tags/$tag") {
            throw "tag 已存在: $tag。请检查是否重复运行同一发布。"
          }

      - name: 生成发布说明
        id: notes
        if: steps.go.outputs.go == 'true'
        shell: pwsh
        run: |
          $lastStableTag = '${{ steps.ver.outputs.lastStableTag }}'
          $range = if ([string]::IsNullOrWhiteSpace($lastStableTag)) { 'HEAD' } else { "$lastStableTag..HEAD" }
          $commits = @(git log $range --pretty=format:'%s' --no-merges)

          $breaking = New-Object System.Collections.Generic.List[string]
          $features = New-Object System.Collections.Generic.List[string]
          $fixes = New-Object System.Collections.Generic.List[string]
          $others = New-Object System.Collections.Generic.List[string]

          foreach ($commit in $commits) {
            if ([string]::IsNullOrWhiteSpace($commit)) { continue }
            if ($commit -match '(?i)bump version|发布 v|chore:.*version') { continue }

            if ($commit -match '(?i)BREAKING CHANGE|^[a-z]+(\([^)]*\))?!:') {
              $breaking.Add("- $commit")
            } elseif ($commit -match '^feat(\([^)]*\))?:\s*(.+)$') {
              $features.Add("- $($Matches[2])")
            } elseif ($commit -match '^fix(\([^)]*\))?:\s*(.+)$') {
              $fixes.Add("- $($Matches[2])")
            } else {
              $others.Add("- $commit")
            }
          }

          $preTags = @()
          if (-not [string]::IsNullOrWhiteSpace($lastStableTag)) {
            $preTags = @(git tag --merged HEAD | Where-Object { $_ -match '^v\d+\.\d+\.\d+-(beta|alpha|rc|preview|nightly)\.' } | ForEach-Object {
              $tag = $_
              $sha = git rev-list -n 1 $tag
              git merge-base --is-ancestor $lastStableTag $sha
              if ($LASTEXITCODE -eq 0) { $tag }
            } | Sort-Object)
          }

          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add('## NuGet')
          $lines.Add('')
          $lines.Add('```bash')
          $lines.Add("dotnet add package Leistd.Core --version ${{ steps.ver.outputs.version }}")
          $lines.Add('```')
          $lines.Add('')
          $lines.Add('## 变更范围')
          $lines.Add('')
          if ([string]::IsNullOrWhiteSpace($lastStableTag)) {
            $lines.Add('- 首个稳定版本，包含当前历史中的所有提交。')
          } else {
            $lines.Add("- $lastStableTag..${{ steps.ver.outputs.tag }}")
          }
          $lines.Add('')

          if ($breaking.Count -gt 0) { $lines.Add('## Breaking Changes'); $lines.Add(''); $breaking | ForEach-Object { $lines.Add($_) }; $lines.Add('') }
          if ($features.Count -gt 0) { $lines.Add('## 新功能'); $lines.Add(''); $features | ForEach-Object { $lines.Add($_) }; $lines.Add('') }
          if ($fixes.Count -gt 0) { $lines.Add('## 修复'); $lines.Add(''); $fixes | ForEach-Object { $lines.Add($_) }; $lines.Add('') }
          if ($others.Count -gt 0) { $lines.Add('## 其他更新'); $lines.Add(''); $others | ForEach-Object { $lines.Add($_) }; $lines.Add('') }
          if ($breaking.Count + $features.Count + $fixes.Count + $others.Count -eq 0) { $lines.Add('## 更新内容'); $lines.Add(''); $lines.Add('- 代码优化和维护更新。'); $lines.Add('') }

          if ($preTags.Count -gt 0 -and '${{ steps.ch.outputs.channel }}' -eq 'stable') {
            $lines.Add('## 已验证的预发布版本')
            $lines.Add('')
            $preTags | ForEach-Object { $lines.Add("- $_") }
            $lines.Add('')
          }

          $content = $lines -join "`n"
          "content<<EOF" | Out-File $env:GITHUB_OUTPUT -Append
          $content | Out-File $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File $env:GITHUB_OUTPUT -Append

      - name: 准备 stable 版本提交
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel == 'stable'
        shell: pwsh
        run: |
          Set-Content -NoNewline -Path VERSION -Value '${{ steps.ver.outputs.version }}'
          $f = 'template/backend/Directory.Build.props'
          $t = Get-Content $f -Raw
          $t = [regex]::Replace($t, '<LeistdFrameworkVersion>\s*[^<]*?\s*</LeistdFrameworkVersion>', '<LeistdFrameworkVersion>${{ steps.ver.outputs.version }}</LeistdFrameworkVersion>')
          [System.IO.File]::WriteAllText((Resolve-Path $f), $t)

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add VERSION template/backend/Directory.Build.props
          if (git diff --cached --quiet) {
            Write-Host '没有需要回写的版本文件变更。'
          } else {
            git commit -m 'chore: 发布 ${{ steps.ver.outputs.tag }} [skip ci]'
          }
          git tag -a '${{ steps.ver.outputs.tag }}' -m 'Release ${{ steps.ver.outputs.tag }}'

      - name: 打包
        if: steps.go.outputs.go == 'true'
        shell: pwsh
        run: |
          if (Test-Path framework/artifacts) { Remove-Item -Recurse -Force framework/artifacts }
          dotnet pack framework/Leistd.Framework.slnx -c Release `
            -o framework/artifacts `
            -p:Version="${{ steps.ver.outputs.version }}" `
            -p:PackageVersion="${{ steps.ver.outputs.version }}" `
            -p:ContinuousIntegrationBuild=true
          if ($LASTEXITCODE -ne 0) { throw 'dotnet pack 失败' }

      - name: 登录 nuget.org
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel != 'nightly'
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: 推送到 nuget.org
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel != 'nightly'
        run: >
          dotnet nuget push "framework/artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --skip-duplicate

      - name: 推送到 GitHub Packages（nightly）
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel == 'nightly'
        run: >
          dotnet nuget push "framework/artifacts/*.nupkg"
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

      - name: 推送 stable 提交与 tag
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel == 'stable'
        shell: pwsh
        run: |
          git push origin HEAD:main
          git push origin '${{ steps.ver.outputs.tag }}'

      - name: 推送 tag（beta/nightly）
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel != 'stable'
        shell: pwsh
        run: |
          git tag -a '${{ steps.ver.outputs.tag }}' -m 'Release ${{ steps.ver.outputs.tag }}'
          git push origin '${{ steps.ver.outputs.tag }}'

      - name: 创建 GitHub Release（stable）
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Release ${{ steps.ver.outputs.tag }}
          body: ${{ steps.notes.outputs.content }}
          files: framework/artifacts/*.nupkg
          prerelease: false
          make_latest: true

      - name: 创建 GitHub Prerelease（beta）
        if: steps.go.outputs.go == 'true' && steps.ch.outputs.channel == 'beta'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Prerelease ${{ steps.ver.outputs.tag }}
          body: ${{ steps.notes.outputs.content }}
          files: framework/artifacts/*.nupkg
          prerelease: true
          make_latest: false
